name: Update delay data

on:
  schedule:
    # Daily at 10:00 UTC (early US morning). Adjust or add a second run
    # a few hours before departure if you like.
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # manual "Run workflow" button

permissions:
  contents: write  # allow the job to commit public/data.json

concurrency:
  group: update-delay-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Fetch feeds and score risk
        env:
          # Amadeus (Self-Service). Add these as repo secrets to enable the
          # flight-delay probability source.
          AMADEUS_CLIENT_ID: ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET: ${{ secrets.AMADEUS_CLIENT_SECRET }}
          # Override if you use the production Amadeus host instead of test.
          AMADEUS_HOST: ${{ vars.AMADEUS_HOST }}
          # Local timezone used for the "generated_local" display string.
          LOCAL_TZ: ${{ vars.LOCAL_TZ }}
        run: python scripts/fetch_and_score.py

      - name: Commit updated data.json (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/data.json; then
            echo "No change in public/data.json — nothing to commit."
          else
            git add public/data.json
            git commit -m "chore: update delay data [skip ci]"
            git push
          fi

      # ---------------------------------------------------------------------
      # EMAIL ALERTS (disabled — you chose "skip email for now").
      # To enable Gmail SMTP alerts on HIGH/MODERATE trips:
      #   1. Create a Gmail App Password.
      #   2. Add repo secrets: MAIL_USERNAME, MAIL_PASSWORD, MAIL_TO.
      #   3. Have fetch_and_score.py write a flag (e.g. public/alert.txt) when
      #      any trip is HIGH/MODERATE, and gate this step on it.
      #   4. Uncomment the step below.
      # ---------------------------------------------------------------------
