      #   if: ${{ hashFiles('public/alert.txt') != '' }}
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     secure: true
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     to: ${{ secrets.MAIL_TO }}
      #     from: Flight Delay Alerter <${{ secrets.MAIL_USERNAME }}>
      #     subject: "Flight delay risk alert"
      #     body: file://public/alert.txt
