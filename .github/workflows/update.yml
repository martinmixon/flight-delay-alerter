name: Update delay data

on:
  schedule:
    # Daily at 10:00 UTC (early US morning). Adjust or add a second run
    # a few hours before departure if you like.
    - cron: "0 10 * * *"
  workflow_dispatch: {}  # manual "Run workflow" button
  push:
    branches: [main]
    paths:
      # Re-score promptly when trips change (e.g. edited via the in-app editor
      # and committed). [skip ci] on the bot's own data commits avoids loops.
      - "trips.json"

permissions:
  contents: write  # allow the job to commit docs/data.json

concurrency:
  group: update-delay-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Fetch feeds and score risk
        env:
          # Local timezone used for the "generated_local" display string.
          LOCAL_TZ: ${{ vars.LOCAL_TZ }}
        run: python scripts/fetch_and_score.py

      - name: Publish trips config to the site
        # Mirror trips.json into docs/ so the in-app editor can load the
        # committed trips as its baseline.
        run: cp trips.json docs/trips.json

      - name: Commit updated data (only if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/trips.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update delay data [skip ci]"
            git push
          fi

      # ---------------------------------------------------------------------
      # EMAIL ALERTS (disabled — you chose "skip email for now").
      # To enable Gmail SMTP alerts on HIGH/MODERATE trips:
      #   1. Create a Gmail App Password.
      #   2. Add repo secrets: MAIL_USERNAME, MAIL_PASSWORD, MAIL_TO.
      #   3. Have fetch_and_score.py write a flag (e.g. docs/alert.txt) when
      #      any trip is HIGH/MODERATE, and gate this step on it.
      #   4. Uncomment the step below.
      # ---------------------------------------------------------------------
      # - name: Send alert email
      #   if: ${{ hashFiles('docs/alert.txt') != '' }}
      #   uses: dawidd6/action-send-mail@v3
      #   with:
      #     server_address: smtp.gmail.com
      #     server_port: 465
      #     secure: true
      #     username: ${{ secrets.MAIL_USERNAME }}
      #     password: ${{ secrets.MAIL_PASSWORD }}
      #     to: ${{ secrets.MAIL_TO }}
      #     from: Flight Delay Alerter <${{ secrets.MAIL_USERNAME }}>
      #     subject: "Flight delay risk alert"
      #     body: file://docs/alert.txt
